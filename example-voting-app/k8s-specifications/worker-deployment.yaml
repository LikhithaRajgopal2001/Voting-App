---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: example-voting-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-voting-app
  template:
    metadata:
      labels:
        app: example-voting-app
    spec:
      containers:
      - name: worker
        image: worker-image:latest
        env:
        - name: POSTGRES_HOST
          value: "db"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"