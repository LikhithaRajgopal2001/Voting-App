name: Voting App CI/CD
on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Build & Push Docker Image
  # ─────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ vars.DOCKER_USERNAME }}/voting-result:latest ./example-voting-app/result

      - name: Push Docker Images
        run: |
          docker push ${{ vars.DOCKER_USERNAME }}/voting-result:latest

  # ─────────────────────────────────────────
  # JOB 2 — Provision Infrastructure
  # ─────────────────────────────────────────
  terraform-provision:
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      ec2_public_ip: ${{ steps.get_outputs.outputs.ec2_public_ip }}
      private_key_pem: ${{ steps.get_outputs.outputs.private_key_pem }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: pip install boto3

      - name: Run infrastructure-provisioning.py
        run: |
          python automation/infrasturcture-provisioning.py provision
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Get Terraform Outputs
        id: get_outputs
        working-directory: terraform/
        run: |
          EC2_IP=$(terraform output -raw ec2_public_ip)
          PRIVATE_KEY=$(terraform output -raw private_key_pem)

          # Pass outputs to next job
          echo "ec2_public_ip=$EC2_IP" >> $GITHUB_OUTPUT
          echo "EC2 IP: $EC2_IP"
          
          # Pass private key as multiline output
          echo "private_key_pem<<EOF" >> $GITHUB_OUTPUT
          echo "$PRIVATE_KEY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ✅ Cleanup on failure
      - name: Cleanup Infrastructure on Failure
        if: failure()
        working-directory: terraform/
        run: |
          echo "❌ Job failed! Destroying all AWS resources..."
          terraform destroy -auto-approve
          echo "✅ Infrastructure destroyed successfully"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

  # ─────────────────────────────────────────
  # JOB 3 — Deploy on EC2
  # ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: terraform-provision

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ needs.terraform-provision.outputs.private_key_pem }}" > ~/.ssh/voting-app-key.pem
          chmod 600 ~/.ssh/voting-app-key.pem
          ssh-keyscan -H ${{ needs.terraform-provision.outputs.ec2_public_ip }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy and Run Setup.sh on EC2
        run: |
          scp -i ~/.ssh/voting-app-key.pem \
            terraform/setup.sh \
            ubuntu@${{ needs.terraform-provision.outputs.ec2_public_ip }}:~/setup.sh

          ssh -i ~/.ssh/voting-app-key.pem \
            ubuntu@${{ needs.terraform-provision.outputs.ec2_public_ip }} \
            "chmod +x ~/setup.sh && sudo ~/setup.sh"

      # ✅ FIXED: Copy K8s Manifests to EC2
      - name: Copy K8s Manifests to EC2
        run: |
          EC2_IP="${{ needs.terraform-provision.outputs.ec2_public_ip }}"
          SSH_KEY="~/.ssh/voting-app-key.pem"
          
          echo "📋 Copying K8s manifests to EC2..."
          
          # Create k8s-specifications directory on EC2
          ssh -i $SSH_KEY ubuntu@$EC2_IP "mkdir -p ~/k8s-specifications"
          
          # Copy all YAML files from k8s-specifications
          scp -i $SSH_KEY example-voting-app/k8s-specifications/*.yaml \
            ubuntu@$EC2_IP:~/k8s-specifications/
          
          echo "✅ K8s manifests copied successfully"
          
          # Verify files were copied
          ssh -i $SSH_KEY ubuntu@$EC2_IP "echo '📦 Files copied:' && ls -la ~/k8s-specifications/"

      # ✅ Deploy with kubectl
      - name: Deploy with kubectl
        run: |
          EC2_IP="${{ needs.terraform-provision.outputs.ec2_public_ip }}"
          SSH_KEY="~/.ssh/voting-app-key.pem"
          
          ssh -i $SSH_KEY ubuntu@$EC2_IP << 'EOF'
            echo "🚀 Deploying voting app to k3s..."
            echo ""
            
            # Apply all K8s manifests
            sudo /usr/local/bin/k3s kubectl apply -f ~/k8s-specifications/
            
            echo ""
            echo "⏳ Waiting for deployments to be ready..."
            sleep 10
            
            echo ""
            echo "📊 Deployment Status:"
            sudo /usr/local/bin/k3s kubectl get pods -o wide
            
            echo ""
            echo "📋 Services:"
            sudo /usr/local/bin/k3s kubectl get svc -o wide
            
            echo ""
            echo "✅ Voting App deployed successfully!"
            echo ""
            echo "Access the application at:"
            echo "  Vote App:    http://$(hostname -I | awk '{print $1}'):30080"
            echo "  Result App:  http://$(hostname -I | awk '{print $1}'):30081"
          EOF

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/voting-app-key.pem

      # ✅ Cleanup on failure
      - name: Cleanup Infrastructure on Deployment Failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Destroying all AWS resources..."
          cd terraform/
          terraform init
          terraform destroy -auto-approve
          echo "✅ Infrastructure destroyed successfully"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
        continue-on-error: true

  # ─────────────────────────────────────────
  # JOB 4 — Notification (Optional)
  # ─────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform-provision, deploy]
    if: always()
    steps:
      - name: Workflow Status Summary
        run: |
          echo "## 📊 Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Build & Push | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Terraform Provision | ${{ needs.terraform-provision.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **All jobs completed successfully!**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.terraform-provision.result }}" == "failure" ] || [ "${{ needs.deploy.result }}" == "failure" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Deployment failed - Resources have been cleaned up**" >> $GITHUB_STEP_SUMMARY
          fi
