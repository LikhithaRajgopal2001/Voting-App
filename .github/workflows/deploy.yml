name: Voting App CI/CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: voting-result

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ env.DOCKER_USERNAME }}/voting-result:latest ./example-voting-app/result

    - name: Push Docker Image
      run: |
        docker push ${{ env.DOCKER_USERNAME }}/voting-result:latest



  terraform-provision:
    needs: build-and-push   # Waits for build-and-push to complete
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.6.0

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip

    - name: Run Terraform via Python
      run: |
        python ${{ env.TERRAFORM_DIR }}/automation/infrasturcture-provisioning.py

    
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest 

    steps:

    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    - name: Deploy using kubectl
      run: |
        kubectl apply -f k8s/